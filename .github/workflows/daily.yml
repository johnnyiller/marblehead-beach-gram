name: Daily Marblehead Tidegram

on:
  workflow_dispatch:
    inputs:
      post_to_instagram:
        description: "Post the generated image to Instagram"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "30 11 * * *"

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  generate-deploy-post:
    name: Generate, deploy, and optionally post
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Tidegram
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || vars.OPENAI_API_KEY }}
          NWS_USER_AGENT: ${{ secrets.NWS_USER_AGENT || vars.NWS_USER_AGENT }}
          NOAA_STATION_ID: ${{ vars.NOAA_STATION_ID }}
          LOCATION_LAT: ${{ vars.LOCATION_LAT }}
          LOCATION_LON: ${{ vars.LOCATION_LON }}
          DAYS_TO_FORECAST: ${{ vars.DAYS_TO_FORECAST }}
        run: python scripts/generate.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post to Instagram
        if: ${{ (github.event_name == 'schedule' && vars.AUTO_POST_TO_INSTAGRAM == 'true') || (github.event_name == 'workflow_dispatch' && inputs.post_to_instagram) }}
        env:
          PUBLIC_IMAGE_URL: ${{ steps.deployment.outputs.page_url }}latest.jpg
          IG_USER_ID: ${{ secrets.IG_USER_ID || vars.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN || vars.IG_ACCESS_TOKEN }}
          GRAPH_API_VERSION: ${{ vars.GRAPH_API_VERSION }}
          ALT_TEXT: ${{ vars.ALT_TEXT }}
          DRY_RUN: "false"
        run: python scripts/post_instagram.py


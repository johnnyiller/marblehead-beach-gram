name: Daily Marblehead Tidegram

on:
  workflow_dispatch:
    inputs:
      post_to_instagram:
        description: "Post the generated image to Instagram"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "30 11 * * *"

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

jobs:
  generate-deploy-post:
    name: Generate, deploy, and optionally post
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Load repository variables
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          require_variable() {
            name="$1"
            value="$(gh variable get "$name" 2>/dev/null || true)"
            if [ -z "$value" ]; then
              echo "Missing required GitHub Actions variable: $name" >&2
              exit 1
            fi
            printf '%s=%s\n' "$name" "$value" >> "$GITHUB_ENV"
          }

          optional_variable() {
            name="$1"
            value="$(gh variable get "$name" 2>/dev/null || true)"
            if [ -n "$value" ]; then
              printf '%s=%s\n' "$name" "$value" >> "$GITHUB_ENV"
            fi
          }

          require_variable OPENAI_API_KEY
          require_variable NWS_USER_AGENT
          optional_variable NOAA_STATION_ID
          optional_variable LOCATION_LAT
          optional_variable LOCATION_LON
          optional_variable DAYS_TO_FORECAST
          optional_variable IG_USER_ID
          optional_variable IG_ACCESS_TOKEN
          optional_variable GRAPH_API_VERSION
          optional_variable ALT_TEXT

      - name: Generate Tidegram
        run: python scripts/generate.py

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post to Instagram
        if: ${{ (github.event_name == 'schedule' && vars.AUTO_POST_TO_INSTAGRAM == 'true') || (github.event_name == 'workflow_dispatch' && inputs.post_to_instagram) }}
        env:
          PUBLIC_IMAGE_URL: ${{ steps.deployment.outputs.page_url }}latest.jpg
          DRY_RUN: "false"
        run: python scripts/post_instagram.py

name: Daily Marblehead Tidegram

on:
  workflow_dispatch:
    inputs:
      validate_instagram_only:
        description: "Validate Instagram credentials without generating or posting"
        required: false
        type: boolean
        default: false
      post_to_instagram:
        description: "Post the generated image to Instagram"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "27,57 12-14 * * *"

env:
  TZ: ${{ vars.TIMEZONE || 'America/New_York' }}
  TIMEZONE: ${{ vars.TIMEZONE || 'America/New_York' }}

concurrency:
  group: gh-pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-deploy-post:
    name: Generate, deploy, and optionally post
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check scheduled Instagram post guard
        id: post_guard
        if: ${{ github.event_name == 'schedule' && vars.AUTO_POST_TO_INSTAGRAM == 'true' }}
        env:
          POST_AFTER_LOCAL: "08:27"
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from __future__ import annotations

          import os
          import subprocess
          import sys
          from datetime import datetime, time
          from zoneinfo import ZoneInfo

          tz_name = os.environ.get("TIMEZONE") or "America/New_York"
          post_after = os.environ.get("POST_AFTER_LOCAL", "08:27")
          hour, minute = [int(part) for part in post_after.split(":", 1)]
          now = datetime.now(ZoneInfo(tz_name))
          marker_path = f".posted/instagram-{now.date().isoformat()}.txt"
          before_window = now.time() < time(hour, minute)
          already_posted = False

          if not before_window:
              subprocess.run(["git", "fetch", "origin", "gh-pages", "--depth=1"], check=False)
              marker_check = subprocess.run(
                  ["git", "cat-file", "-e", f"origin/gh-pages:{marker_path}"],
                  stderr=subprocess.DEVNULL,
              )
              already_posted = marker_check.returncode == 0

          skip_reason = ""
          if before_window:
              skip_reason = f"local time {now.strftime('%H:%M %Z')} is before {post_after}"
          elif already_posted:
              skip_reason = f"{marker_path} already exists on gh-pages"

          print(f"marker_path={marker_path}")
          print(f"local_time={now.isoformat()}")
          print(f"before_window={str(before_window).lower()}")
          print(f"already_posted={str(already_posted).lower()}")
          print(f"skip={str(bool(skip_reason)).lower()}")
          print(f"skip_reason={skip_reason}")
          if skip_reason:
              print(f"Skipping scheduled Instagram post: {skip_reason}", file=sys.stderr)
          PY

      - name: Report skipped scheduled post
        if: ${{ github.event_name == 'schedule' && vars.AUTO_POST_TO_INSTAGRAM == 'true' && steps.post_guard.outputs.skip == 'true' }}
        run: echo "${{ steps.post_guard.outputs.skip_reason }}"

      - name: Generate Tidegram
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.validate_instagram_only) && steps.post_guard.outputs.skip != 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NWS_USER_AGENT: ${{ vars.NWS_USER_AGENT }}
          NOAA_STATION_ID: ${{ vars.NOAA_STATION_ID }}
          LOCATION_LAT: ${{ vars.LOCATION_LAT }}
          LOCATION_LON: ${{ vars.LOCATION_LON }}
          DAYS_TO_FORECAST: ${{ vars.DAYS_TO_FORECAST }}
        run: python scripts/generate.py

      - name: Publish to gh-pages branch
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.validate_instagram_only) && steps.post_guard.outputs.skip != 'true' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          force_orphan: true

      - name: Resolve public image URL
        id: public_image
        if: ${{ steps.post_guard.outputs.skip != 'true' && ((github.event_name == 'schedule' && vars.AUTO_POST_TO_INSTAGRAM == 'true') || (github.event_name == 'workflow_dispatch' && inputs.post_to_instagram && !inputs.validate_instagram_only)) }}
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          from pathlib import Path

          metadata = json.loads(Path("site/latest.json").read_text(encoding="utf-8"))
          image_path = metadata.get("dated_jpg") or metadata.get("latest_jpg") or "latest.jpg"
          local_path = Path("site") / image_path
          if not local_path.is_file():
              raise SystemExit(f"Resolved Instagram image does not exist locally: {local_path}")
          url = f"https://{os.environ['REPO_OWNER']}.github.io/{os.environ['REPO_NAME']}/{image_path}"
          print(f"Resolved Instagram image URL: {url}", file=__import__("sys").stderr)
          print(f"url={url}")
          PY

      - name: Validate Instagram credentials
        if: ${{ steps.post_guard.outputs.skip != 'true' && ((github.event_name == 'workflow_dispatch' && inputs.validate_instagram_only) || (github.event_name == 'schedule' && vars.AUTO_POST_TO_INSTAGRAM == 'true') || (github.event_name == 'workflow_dispatch' && inputs.post_to_instagram)) }}
        env:
          IG_USER_ID: ${{ vars.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_GRAPH_API_BASE_URL: ${{ vars.IG_GRAPH_API_BASE_URL || 'https://graph.instagram.com' }}
          GRAPH_API_VERSION: ${{ vars.GRAPH_API_VERSION || 'v23.0' }}
        run: python scripts/post_instagram.py --validate-credentials

      - name: Post to Instagram
        if: ${{ steps.post_guard.outputs.skip != 'true' && ((github.event_name == 'schedule' && vars.AUTO_POST_TO_INSTAGRAM == 'true') || (github.event_name == 'workflow_dispatch' && inputs.post_to_instagram && !inputs.validate_instagram_only)) }}
        env:
          PUBLIC_IMAGE_URL: ${{ steps.public_image.outputs.url }}
          IG_USER_ID: ${{ vars.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_GRAPH_API_BASE_URL: ${{ vars.IG_GRAPH_API_BASE_URL || 'https://graph.instagram.com' }}
          GRAPH_API_VERSION: ${{ vars.GRAPH_API_VERSION || 'v23.0' }}
          ALT_TEXT: ${{ vars.ALT_TEXT }}
          DRY_RUN: "false"
          PUBLIC_IMAGE_WAIT_SECONDS: "900"
        run: python scripts/post_instagram.py

      - name: Mark today's Instagram post
        if: ${{ github.event_name == 'schedule' && vars.AUTO_POST_TO_INSTAGRAM == 'true' && steps.post_guard.outputs.skip != 'true' }}
        run: |
          mkdir -p site/.posted
          {
            echo "posted_at_utc=$(date -u --iso-8601=seconds)"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "image_url=${{ steps.public_image.outputs.url }}"
          } > "site/${{ steps.post_guard.outputs.marker_path }}"

      - name: Publish Instagram post marker
        if: ${{ github.event_name == 'schedule' && vars.AUTO_POST_TO_INSTAGRAM == 'true' && steps.post_guard.outputs.skip != 'true' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          force_orphan: true

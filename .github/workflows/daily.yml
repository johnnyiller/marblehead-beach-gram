name: Daily Marblehead Tidegram

on:
  workflow_dispatch:
    inputs:
      post_to_instagram:
        description: "Post the generated image to Instagram"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "30 11 * * *"

env:
  TZ: ${{ vars.TIMEZONE || 'America/New_York' }}
  TIMEZONE: ${{ vars.TIMEZONE || 'America/New_York' }}

concurrency:
  group: gh-pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-deploy-post:
    name: Generate, deploy, and optionally post
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Tidegram
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NWS_USER_AGENT: ${{ vars.NWS_USER_AGENT }}
          NOAA_STATION_ID: ${{ vars.NOAA_STATION_ID }}
          LOCATION_LAT: ${{ vars.LOCATION_LAT }}
          LOCATION_LON: ${{ vars.LOCATION_LON }}
          DAYS_TO_FORECAST: ${{ vars.DAYS_TO_FORECAST }}
        run: python scripts/generate.py

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          force_orphan: true

      - name: Post to Instagram
        if: ${{ (github.event_name == 'schedule' && vars.AUTO_POST_TO_INSTAGRAM == 'true') || (github.event_name == 'workflow_dispatch' && inputs.post_to_instagram) }}
        env:
          PUBLIC_IMAGE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/latest.jpg
          IG_USER_ID: ${{ vars.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GRAPH_API_VERSION: ${{ vars.GRAPH_API_VERSION }}
          ALT_TEXT: ${{ vars.ALT_TEXT }}
          DRY_RUN: "false"
        run: python scripts/post_instagram.py
